<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>title</title>
    <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="/plugins/jsgrid/jsgrid.min.css">
    <link rel="stylesheet" href="/plugins/jsgrid/jsgrid-theme.min.css">
    <link rel="stylesheet" href="/plugins/jquery-flowchart/jquery.flowchart.css">
    <link rel="stylesheet" href="/plugins/aggrid/ag-grid.css">
    <link rel="stylesheet" href="/plugins/aggrid/ag-theme-quartz.css">
    <link rel="stylesheet" href="/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="/plugins/codemirror/codemirror.css">
    <link rel="stylesheet" href="/plugins/codemirror/theme/darcula.css">
    <link rel="stylesheet" href="/plugins/jstree/themes/default/style.min.css" />
    <link rel="stylesheet" href="/ui/view-builder/css/vb-theme.css" />
    <link rel="stylesheet" href="/core/css/sheet-theme.css" />

    <style th:replace="~{${contentPath}::style}"></style>
    <style>
        mf-action {
            display: none;
        }

        /* js Grid */
        .jsgrid {
            border: none;
            font-family: "Segoe UI", Arial, sans-serif;
        }
        .jsgrid-header-row > .jsgrid-header-cell {
            background: #f8fafc;           /* 아주 연한 회색 */
            color: #334155;                /* 다크 슬레이트 */
            font-size: 14px;
            font-weight: 500;              /* 적당한 강조 */
            padding: 8px 10px;
            border: none;
            border-bottom: 1px solid #e2e8f0;
            height: 32px;
            line-height: 22px;
            text-align: left;
            letter-spacing: 0.2px;
            transition: background 0.15s ease;
        }
        /* hover 효과 */
        .jsgrid-header-row > .jsgrid-header-cell:hover {
            background: #eef2f7;
        }
        /* 정렬 가능한 컬럼 */
        .jsgrid-header-sortable {
            cursor: pointer;
        }
        /* 정렬 아이콘 위치 여백 */
        .jsgrid-header-cell .jsgrid-header-sort {
            margin-left: 6px;
            opacity: 0.5;
        }
        /* 테이블 전체 라인 최소화 */
        .jsgrid-grid-header, .jsgrid-grid-body {
            border: none;
        }

        .ag-row:hover {
          cursor: pointer;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div th:replace="~{${contentPath}::view}"></div>
</div>
<script src="/plugins/jquery/jquery.min.js"></script>
<script src="/plugins/jquery-ui/jquery-ui.min.js"></script>
<script src="/plugins/jquery-flowchart/jquery.flowchart.js"></script>
<script src="/plugins/jquery-moment/moment.min.js"></script>
<script>$.widget.bridge('uibutton', $.ui.button)</script>
<script src="/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/plugins/overlayScrollbars/js/jquery.overlayScrollbars.min.js"></script>
<script src="/plugins/jsgrid/jsgrid.min.js"></script>
<script src="/plugins/codemirror/codemirror.js"></script>
<script src="/plugins/codemirror/mode/sql/sql.js"></script>
<script src="/plugins/codemirror/mode/javascript/javascript.js"></script>
<script src="/plugins/jstree/jstree.min.js"></script>
<script src="/plugins/aggrid/ag-grid-community.min.js"></script>

<script src="/dist/js/adminlte.js?v=1"></script>
<script src="/core/Util.js"></script>
<script src="/core/LoadingBar.js"></script>
<script src="/core/HttpClient.js"></script>
<script src="/core/Sheet.js"></script>
<script src="/core/Grid.js"></script>
<script src="/core/GridLegacy.js"></script>
<script src="/core/WorkflowClient.js"></script>
<script src="/core/Popup.js"></script>
<script src="/core/ModalPopup.js"></script>
<script type="module" src="/ui/tag/mf/module.js"></script>
<script>
    const grid = new GridLegacy(App.grid);
    const httpClient = new HttpClient();
    App.loadingBar.render();
</script>
<script th:replace="~{${contentPath}::script}"></script>
</body>
</html>
